<main>
<div class="note">Reach out about anything — orders, returns, products, partnerships. Real human reply within one working day.</div>
<form id="contact-form" action="mailto:knechtelross+vector@gmail.com" method="post" enctype="text/plain">
  <div class="field"><label for="name">Your name</label><input type="text" id="name" name="name" required></div>
  <div class="field"><label for="email">Your email</label><input type="email" id="email" name="email" required></div>
  <div class="field"><label for="topic">What's this about?</label>
    <select id="topic" name="topic">
      <option>An existing order</option><option>Product question</option><option>Return or refund</option>
      <option>Partnership / wholesale</option><option>Press / media</option><option>Something else</option>
    </select>
  </div>
  <div class="field"><label for="order">Order ref (if relevant)</label><input type="text" id="order" name="order" placeholder="e.g. SKU-VEC-001 or order #1234"></div>
  <div class="field"><label for="message">Your message</label><textarea id="message" name="message" required></textarea></div>
  <button type="submit">Send message</button>
</form>
</main>
